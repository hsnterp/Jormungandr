# Jormungandr — default configuration
# All phases read from this file. Values here are the reproducible defaults.

seed: 42

# ----------------------------------------------------------------------------
# PHASE 1 — data pipeline
# ----------------------------------------------------------------------------
data:
  dataset: STEAD
  sampling_rate: 100        # Hz
  window_samples: 6000      # 60 s * 100 Hz
  n_channels: 3
  cache_dir: data           # SeisBench data cache / derived artifacts
  require_cached: true      # fail instead of starting a STEAD download

  # Subset size (STEAD is huge; start small). Tunable per the task spec.
  subset:
    n_earthquake: 50000
    n_noise: 25000

  # Preprocessing (applied to every trace, train + eval)
  preprocess:
    demean: true
    bandpass:
      apply: true
      freqmin: 1.0
      freqmax: 45.0
      order: 4
    normalization: std       # "std" (per-trace) or "max"
    eps: 1.0e-8

  # Label-mask generation from arrival sample indices
  labels:
    pick_sigma_s: 0.25       # Gaussian pick bump std, seconds (~0.2-0.3s)
    # Detection window right edge: "coda" uses coda_end_sample when present,
    # falling back to S + detection_fallback_s, then P + detection_fallback_s.
    detection_source: coda
    detection_fallback_s: 10.0
    detection_pad_s: 0.0     # symmetric pad added to detection window edges

  # Train/val/test split — grouped so no station/event leaks across splits
  split:
    by: event                # group key: "event" (source_id) w/ station fallback
    ratios: [0.8, 0.1, 0.1]  # train / val / test
    hash_mod: 1000

# Augmentations — TRAINING ONLY (dataset applies these when train=True)
augment:
  enabled: true
  window_shift:
    enabled: true
    max_shift_s: 15.0        # arrivals can land anywhere in the window
  noise_mixing:
    enabled: true
    prob: 0.5
    target_snr_db: [-5.0, 15.0]   # uniform range for synthesized low-SNR
  channel_dropout:
    enabled: true
    prob: 0.2
    max_channels: 1

# ----------------------------------------------------------------------------
# PHASE 2 — model (1D U-Net, <300k params, quantization-friendly ops)
# ----------------------------------------------------------------------------
model:
  stem_channels: 16
  encoder_channels: [16, 32, 64, 96]
  kernel_size: 7
  bottleneck_dilations: [2, 4]
  out_channels: 3

# ----------------------------------------------------------------------------
# PHASE 3 — training
# ----------------------------------------------------------------------------
train:
  device: cuda               # training only; all deploy code is CPU-only
  batch_size: 64
  epochs: 50
  num_workers: 4
  optimizer: adam
  lr: 1.0e-3
  weight_decay: 1.0e-4
  scheduler: cosine
  grad_clip: 1.0
  loss:
    # per-stream weights; P and S weighted ~5x vs detection
    stream_weights:
      detection: 1.0
      p: 5.0
      s: 5.0
  overfit:                   # sanity check before full training
    n_traces: 100
    epochs: 1000
    lr: 3.0e-3               # higher LR: full-batch memorization test
  checkpoint_dir: checkpoints
  log_dir: outputs
  run_name: stage1
  metrics_filename: train_metrics.csv
  loss_curve_filename: train_loss.png
  min_lr: 1.0e-6
  early_stopping_patience: 10
  smoke_test:
    run_name: stage1_smoke
    n_train: 16
    n_val: 8
    epochs: 1
    batch_size: 4
    num_workers: 0

# ----------------------------------------------------------------------------
# STAGE 2 — knowledge distillation from pretrained EQTransformer (teacher)
# Teacher is used ONLY for soft Detection/P/S streams. Student arch unchanged.
# ----------------------------------------------------------------------------
distill:
  enabled: true
  teacher: EQTransformer
  teacher_pretrained: stead
  cache_dir: data/teacher_cache   # chunked/resumable teacher-output cache
  # Blended loss: L = alpha*BCE(student, teacher_soft) + (1-alpha)*BCE(student, hard)
  alpha: 0.5                 # weight on teacher-soft loss (== blend_ratio)
  blend_ratio: 0.5           # legacy alias for alpha (alpha is authoritative)
  temperature: 1.0           # softens the TEACHER target only; 1.0 = no-op
  # Teacher caching (Stage 2a) — cheap to reload, safe to interrupt/resume
  max_cache_samples: null    # cap #train traces to cache (null = all 59,116)
  chunk_size: 512            # traces per cache chunk (the resumable unit)
  cache_dtype: float16       # probs in [0,1]; fp16 halves disk
  # Distillation fine-tune (Stage 2b)
  epochs: 20
  lr: 5.0e-4
  run_name: stage2_distill
  # WARNING: cached teacher outputs were computed on the DETERMINISTIC,
  # non-augmented train windows. Training MUST use those same windows so each
  # cached soft target lines up with the student's input. Enabling augmentations
  # would shift arrivals out from under the cached teacher stream (desync) and is
  # UNSUPPORTED in this first Stage 2 run — the trainer refuses to start if true.
  # Augmentation-aware distillation is a FUTURE enhancement (see docs/stage2.md).
  use_augmentations: false
  low_snr_weighting:         # simple monotone per-trace upweight of low-SNR eq
    enabled: false
    ref_db: 15.0             # weight 1.0 at/above this SNR
    floor_db: 0.0            # weight max_weight at/below this SNR
    max_weight: 3.0
  smoke:                     # tiny end-to-end check (allowed to run)
    max_cache_samples: 24
    chunk_size: 8
    epochs: 1
    batch_size: 4
    num_workers: 0
    n_val: 8                  # val-subset size so the smoke exercises the val pass
    run_name: stage2_distill_smoke

# ----------------------------------------------------------------------------
# PHASE 4 — evaluation
# ----------------------------------------------------------------------------
eval:
  detection_threshold: 0.5
  peak_height: 0.3           # min prob for a pick peak
  peak_min_distance_s: 1.0
  match_tolerance_s: 0.5     # detection TP window
  snr_buckets: [-100, 0, 10, 20, 100]   # dB bin edges

# ----------------------------------------------------------------------------
# PHASE 5 — deployment prep (CPU-only)
# ----------------------------------------------------------------------------
deploy:
  onnx_path: outputs/model.onnx
  opset: 17
  quant:
    calibration_traces: 500
    keep_head_fp32: true     # fallback if picks degrade under INT8
  benchmark:
    warmup_runs: 20
    n_runs: 200
    threads: 1
  streaming:
    window_s: 60
    hop_s: 30
    detection_threshold: 0.80
    min_duration_ms: 10
    event_merge_gap_s: 0.5
    p_threshold: 0.30
    s_threshold: 0.30
    peak_min_distance_s: 1.0
    association_margin_s: 1.0
    threads: 1
